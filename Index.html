<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Día del Padre!</title>
    <link rel="stylesheet" href="Style.css">
    <script src="Script.js" defer></script>
</head>
<body>
    <div class="container" id="mainContainer">
        <!-- Pantalla Inicial -->
        <div id="clickSection">
            <p class="warning-text">⚠️ Alerta de seguridad ⚠️</p>
            <p class="info-text">Se ha detectado un acceso no autorizado.</p>
            <button class="btn-interactive" id="actionBtn" onclick="handleInteractionMode()">NO PRESIONAR</button>
        </div>

        <!-- Contenido Sorpresa -->
        <div class="card-content" id="giftCard">
            <div class="photo-container">
                <img src="foto.jpg" alt="Foto Familiar" id="dadPhoto">
            </div>

            <h1>¡Feliz Día del Padre!</h1>
            <p>Gracias por estar siempre ahí, por tus consejos y tu apoyo incondicional.</p>
            <p>Eres un gran ejemplo a seguir y este detalle digital es para ti.</p>
            <p class="signature">¡Te quiero mucho! ❤️</p>
        </div>
    </div>
</body>
</html>
